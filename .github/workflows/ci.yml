name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python3 -m py_compile server/app.py
          python3 -m py_compile ros2/packages/amr_mission/scripts/mission_manager.py
          python3 -m py_compile ros2/packages/amr_bridge/scripts/web_bridge.py
